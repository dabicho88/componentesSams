

<meta name="viewport" content="width=device-width, initial-scale=1">
<div class="contador"></div>
<script type="text/javascript">
    const contentPrincipal = document.createElement('div');
    const bari = document.querySelector('.contador');

    function actualizarContador(fecha, hexadecimal, copy, imagen, bgImage, inicio) {
        let ahora = Date.now();
        const fin = fecha;
        const finEvento = new Date(Date.UTC(fin[0], fin[1]-1, fin[2], 23+6, 59, 59)); //  EL FORMATO DE HORA ES EN 24HRS
        const ini = inicio;
        const inicioEvento = new Date(Date.UTC(ini[0], ini[1]-1, ini[2], 0+6, 0, 0)); // EL FORMATO DE HORA ES EN 24HRS

        let porcentaje = Math.floor(((finEvento.getTime() - ahora) / (finEvento.getTime() - inicioEvento.getTime())) * 100);
// Es el 100        console.log(finEvento.getTime() - inicioEvento.getTime()); 
// Es el 100        console.log(finEvento.getTime() - ahora); 

        const tiempoRestante = finEvento.getTime() - ahora;
        const segundos = Math.floor((tiempoRestante / 1000) % 60);
        const minutos = Math.floor((tiempoRestante / (1000 * 60)) % 60);
        const horas = Math.floor((tiempoRestante / (1000 * 60 * 60)) % 24);
        const dias = Math.floor(tiempoRestante / (1000 * 60 * 60 * 24));



      contentPrincipal.innerHTML =
    `
  <a class="innerContador">
  <img src="${imagen}">
  <h2>${copy}</h2>
  <div class="date">
    <div class="dateCircle">
      <div>${dias}</div>
      <h3>Días</h3>
    </div>

    <div class="dateCircle">
      <div>${horas}</div>
      <h3>Horas</h3>
    </div>

    <div class="dateCircle">
      <div>${minutos}</div>
      <h3>Minutos</h3>
    </div>


    <div class="dateCircle">
      <div>${segundos}</div>

    </div>
      <div class="barProgres"><div class="barProgresInner"></div></div> 
  </div>
</a>

<style type="text/css">

    bari.insertAdjacentElement('beforeend', contentPrincipal);
    const linkIframe = document.querySelector('.innerContador');

      linkIframe.addEventListener('click', function(enlace){
        enlace.preventDefault();
        window.parent.location.href = linkHref;
      });

    }

    function iniciarContador(fecha, hexadecimal, copy, imagen, bgImage, inicio) {
      actualizarContador(fecha, hexadecimal, copy, imagen, bgImage, inicio); // Actualizar inmediatamente
      setInterval(() => actualizarContador(fecha, hexadecimal, copy, imagen, bgImage, inicio), 1000);
    }

    // COMO CONFIGURAR:
    const inicio = [2026, 2, 20]; // INICIO Establece el inicio del contador por AÑO, MES, DÍA
    const fecha = [2026, 6, 20] // FIN Estblece final de contador por AÑO, MES, DÍA
    const colorFondo = '#f3150f'; // FONDO Color de fondo hexadecimal en caso de no tener imagen de fondo. 
    const ligaImagen = 'https://i5.walmartimages.com/dfw/4ff9c6c9-2284/k2-_fe73d4ac-656d-4290-a33e-0d4a4ac6e50a.v1.png'; //IMAGEN desde tempo 942×394

    const bgImage = 'https://i5.walmartimages.com/dfw/4ff9c6c9-fedd/k2-_29463f8b-9087-4fda-94a9-64f15a0b2319.v1.jpg '; //BACKGROUND - Opcional - Imagen desde tempo SI NO LLEVA SOLO SE DEJAN LAS COMILLAS
