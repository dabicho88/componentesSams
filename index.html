.tarjetitas{

.tarjetaOne{

  width: 100%;
  margin: 0 auto;

  position: relative;
}
.imgFrente{
  width: 100%;
  height: auto;
  padding: 0;
  margin: 0;
  position: relative;
  background-color: #fff;
  transform: perspective(800px) rotateY(00deg);
  backface-visibility: hidden;
  transition:linear .5s;
  border-radius: 8px;
  overflow: hidden;
  display: block;
}
.tarjetaOne p{
  position: absolute;
  display: flex;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  right: 0;
  justify-content: center;
  align-content: center;
  align-items: center;
  margin: auto;
  transform: perspective(800px) rotateY(180deg);
  backface-visibility: hidden;
  transition: linear .5s;

  /*aqui se dita tamaño de la fuente, buscar en  google clamp generator css*/
  font-size: clamp(12px, 3vw, 18px);
  line-height: clamp(13px, 3.2vw, 21px);
  /*aqui se dita tamaño de la fuente, buscar en  google clamp generator css*/

  box-sizing: border-box;
  padding: 5px;
  border-radius: 8px;
}
.tarjetaOne.girado .imgFrente{
  transform: perspective(800px) rotateY(180deg);
}
.tarjetaOne.girado p{
  transform: perspective(800px) rotateY(360deg);
}
.imgBack{
  display: block;
  width: 100%;
  height: auto;
  border-radius: 8px;
}

    const contentPrincipal = document.createElement('div');

    function actualizarContador(fecha, hexadecimal, copy, imagen, bgImage, inicio) {
        let ahora = Date.now();
        const fin = fecha;
        const finEvento = new Date(Date.UTC(fin[0], fin[1]-1, fin[2], 23+6, 59, 59)); //  EL FORMATO DE HORA ES EN 24HRS
        const ini = inicio;
        const inicioEvento = new Date(Date.UTC(ini[0], ini[1]-1, ini[2], 0+6, 0, 0)); // EL FORMATO DE HORA ES EN 24HRS

        let porcentaje = Math.floor(((finEvento.getTime() - ahora) / (finEvento.getTime() - inicioEvento.getTime())) * 100);
// Es el 100        console.log(finEvento.getTime() - inicioEvento.getTime()); 
// Es el 100        console.log(finEvento.getTime() - ahora); 

        const tiempoRestante = finEvento.getTime() - ahora;
        const segundos = Math.floor((tiempoRestante / 1000) % 60);
        const minutos = Math.floor((tiempoRestante / (1000 * 60)) % 60);
        const horas = Math.floor((tiempoRestante / (1000 * 60 * 60)) % 24);
        const dias = Math.floor(tiempoRestante / (1000 * 60 * 60 * 24));



      contentPrincipal.innerHTML =
    `

</a>
